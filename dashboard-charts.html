<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: sans-serif;
      background: #eef2f8;
      padding: 20px;
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .chart-card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
    }
    
    .chart-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a5568;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    
    .custom-legend {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .legend-dash {
      width: 24px;
      height: 14px;
      border: 2px dashed #E05A5A;
      border-radius: 2px;
    }
    
    .legend-solid {
      width: 24px;
      height: 14px;
      background: #7EC8E3;
      border-radius: 2px;
    }
    
    .legend-label {
      font-size: 11px;
      color: #4a5568;
    }
    
    .chart-container {
      position: relative;
      height: 280px;
    }
  </style>
</head>
<body>
  <div class="dashboard-grid">
    <!-- Card 1: Investimento por Dia -->
    <div class="chart-card">
      <div class="chart-title">INVESTIMENTO POR DIA</div>
      <div class="custom-legend">
        <div class="legend-item">
          <div class="legend-dash"></div>
        </div>
        <div class="legend-item">
          <div class="legend-solid"></div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart1"></canvas>
      </div>
    </div>

    <!-- Card 2: Impressões x CPM -->
    <div class="chart-card">
      <div class="chart-title">IMPRESSÕES X CPM</div>
      <div class="custom-legend">
        <div class="legend-item">
          <div class="legend-dash"></div>
        </div>
        <div class="legend-item">
          <div class="legend-solid"></div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart2"></canvas>
      </div>
    </div>

    <!-- Card 3: Cliques x CPC -->
    <div class="chart-card">
      <div class="chart-title">CLIQUES X CPC</div>
      <div class="custom-legend">
        <div class="legend-item">
          <div class="legend-dash"></div>
        </div>
        <div class="legend-item">
          <div class="legend-solid"></div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart3"></canvas>
      </div>
    </div>

    <!-- Card 4: CTR -->
    <div class="chart-card">
      <div class="chart-title">CTR</div>
      <div class="custom-legend">
        <div class="legend-item">
          <div class="legend-dash"></div>
        </div>
        <div class="legend-item">
          <div class="legend-solid"></div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart4"></canvas>
      </div>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);
    
    const labels = ['01/04', '02/04', '03/04', '04/04', '05/04', '06/04', '07/04'];
    
    // Chart 1: Investimento por Dia
    new Chart(document.getElementById('chart1'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Investimento',
            data: [1200, 850, 620, 950, 780, 800, 720],
            backgroundColor: '#7EC8E3',
            borderRadius: 2,
            borderWidth: 0,
            yAxisID: 'y',
            datalabels: {
              color: '#000000',
              anchor: 'end',
              align: 'top',
              offset: 2,
              font: { size: 11, weight: 'bold' }
            }
          },
          {
            label: 'Taxa de conversão',
            data: [0.9, 0.75, 0.62, 0.72, 0.68, 0.78, 0.65],
            type: 'line',
            borderColor: '#E05A5A',
            borderWidth: 2,
            borderDash: [6, 4],
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#E05A5A',
            fill: false,
            yAxisID: 'y1',
            datalabels: {
              color: '#E05A5A',
              anchor: 'end',
              align: 'top',
              offset: 2,
              font: { size: 11, weight: 'bold' }
            }
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 11 }, color: '#888' }
          },
          y: {
            display: true,
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { display: false },
            border: { display: false }
          },
          y1: {
            position: 'right',
            max: 1.0,
            ticks: {
              stepSize: 0.1,
              color: '#E05A5A',
              font: { size: 10 }
            },
            grid: { drawOnChartArea: false },
            border: { display: false }
          }
        }
      }
    });

      options: {

        plugins: {

        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 11 }, color: '#888' }
          },
          y: {
            display: true,
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { display: false },
            border: { display: false }
          },
          y1: {
            position: 'right',
            max: 3.0,
            ticks: {
              stepSize: 0.5,
              color: '#E05A5A',
              font: { size: 10 }
            },
            grid: { drawOnChartArea: false },
            border: { display: false }
          }
        }
      }
    });

    // Chart 4: CTR
    new Chart(document.getElementById('chart4'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Cliques',
            data: [820, 850, 860, 840, 870, 880, 820],

          },
          {

          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            grid: { display: false },

          y: {

          y1: {

            max: 1.0,

      }
    });
  </script>
</body>
</html>
